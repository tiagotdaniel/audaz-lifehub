kind = "web"
previewPath = "/"
title = "Audaz LifeHub"
version = "1.0.0"
id = "artifacts/lifehub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24350

[services.development]
run = "pnpm --filter @workspace/lifehub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lifehub", "run", "build" ]
publicDir = "artifacts/lifehub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24350"
BASE_PATH = "/"
